    <header>
        <a href="index.html">
            <svg xmlns="http://www.w3.org/2000/svg" height="28px" viewBox="0 -960 960 960" width="28px" fill="#252525">
                <path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/>
            </svg>
        </a>
        <svg id="menu" xmlns="http://www.w3.org/2000/svg" height="28px" viewBox="0 -960 960 960" width="28px" fill="#252525">
            <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/>
        </svg>
    </header>

    <!-- Tabs: Recetas | Planificador -->
    <div class="tab-row">
        <button class="rec-tab-btn tab-btn active"   data-tab="recetas"       onclick="switchRecetasTab('recetas')">Recetas</button>
        <button class="rec-tab-btn tab-btn inactive" data-tab="planificador"  onclick="switchRecetasTab('planificador')">📅 Mi semana</button>
    </div>

    <!-- ── PANE RECETAS ── -->
    <div id="pane-recetas">
        <div class="categorias-scroll" id="categorias-tab"></div>
        <div class="recetas-grid" id="recetas-container"></div>
    </div>

    <!-- ── PANE PLANIFICADOR ── -->
    <div id="pane-planificador" class="oculto">
        <div class="plan-header">
            <p class="plan-subtitle">Toca <strong>Añadir a la semana</strong> en cualquier receta para planificar tus comidas.</p>
            <button class="btn-limpiar-plan" onclick="limpiarPlan()">🗑 Limpiar todo</button>
        </div>
        <div id="planificador-container"></div>
    </div>

    <!-- Modal macros -->
    <div id="modal-receta" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <button class="modal-close" id="modal-close-btn">&times;</button>
            <img id="modal-img" src="" alt="" class="modal-img">
            <h2 id="modal-titulo" class="modal-titulo"></h2>
            <div class="macros-grid" id="modal-macros"></div>
            <p id="modal-desc" class="modal-desc"></p>
        </div>
    </div>

    <!-- Modal selector día/momento -->
    <div id="modal-plan-selector" class="modal-overlay" style="display:none;">
        <div class="modal-card modal-plan-card">
            <button class="modal-close" id="modal-plan-close">&times;</button>
            <h3 class="modal-plan-titulo">Añadir a la semana</h3>
            <p id="plan-receta-nombre" class="plan-receta-nombre"></p>

            <label class="plan-label">Día</label>
            <select id="plan-select-dia" class="plan-select">
                <option value="Lunes">Lunes</option>
                <option value="Martes">Martes</option>
                <option value="Miércoles">Miércoles</option>
                <option value="Jueves">Jueves</option>
                <option value="Viernes">Viernes</option>
                <option value="Sábado">Sábado</option>
                <option value="Domingo">Domingo</option>
            </select>

            <label class="plan-label">Momento</label>
            <select id="plan-select-momento" class="plan-select">
                <option value="Desayuno">Desayuno</option>
                <option value="Almuerzo">Almuerzo</option>
                <option value="Comida">Comida</option>
                <option value="Cena">Cena</option>
                <option value="Snack">Snack</option>
            </select>

            <button id="btn-confirmar-plan" class="btn-confirmar-plan">Añadir ✓</button>
        </div>
    </div>

    <script src="comida.js"></script>
    <script src="js.js"></script>
    <script>
        window.limpiarPlan = function() {
            if (confirm('¿Limpiar toda la planificación de la semana?')) {
                localStorage.removeItem('zentia_plan_comidas');
                if (typeof renderPlanificador === 'function') renderPlanificador();
            }
        };
    </script>
</body>
</html>
