<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
    <title>Zentia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
<body>

    <div id="overlay" class="overlay"></div>
    <nav id="side-menu" class="side-menu">
        <div class="close-btn" id="close-menu">&times;</div>
        <a class="asel" href="index.html">
            <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor"><path d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z"/></svg>
            Inicio
        </a>
        <a href="recetas.html">
            <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor"><path d="M280-80v-366q-54-14-87-57t-33-97v-280h80v280h40v-280h80v280h40v-280h80v280q0 54-33 97t-87 57v366h-80Zm240 0v-320h-40v-280q0-83 58.5-141.5T680-880v800h-160Z"/></svg>
            Recetas
        </a>

    <header>
        <h1 class="logo">Zentia</h1>
        <svg id="menu" xmlns="http://www.w3.org/2000/svg" height="28px" viewBox="0 -960 960 960" width="28px" fill="#252525">
            <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/>
        </svg>
    </header>

    <!-- Tab Switcher -->
    <div class="tab-row">
        <button class="tab-btn active"   onclick="switchMainTab('mirutina')">Mi rutina</button>
        <button class="tab-btn inactive" onclick="switchMainTab('ejercicios')">Ejercicios</button>
    </div>

    <!-- ── MI RUTINA ── -->
    <div id="pane-mirutina" class="main-pane active">
        <div class="dias-list" id="dias-container"></div>
        <div class="bottom-bar">
            <div class="info-chip">
                <svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor"><path d="M200-80v-520l280-200 280 200v520H560v-240h-160v240H200Z"/></svg>
                Nueva rutina en <span id="countdown-display">—</span>
            </div>
            <button class="btn-cambiar" onclick="regenerarRutina()">Cambiar rutina</button>
        </div>
    </div>

    <!-- ── EJERCICIOS (acordeones) ── -->
    <div id="pane-ejercicios" class="main-pane">
        <div id="acordeones-container" class="acordeones-wrap"></div>
    </div>

    <script src="ejercicios.js"></script>
    <script src="js.js"></script>
</body>
